<ion-header [translucent]="true">
	<app-list-toolbar
		pageTitle="Danh sách"
		[pageConfig]="pageConfig"
		[selectedItems]="selectedItems"
		[query]="query"
		(add)="add()"
		(refresh)="refresh()"
		(export)="export()"
		(import)="import($event)"
		(help)="help()"
		(unselect)="unselect()"
		(archiveItems)="archiveItems()"
		(deleteItems)="delete()"
		(changeBranch)="changeBranch($event)"
	></app-list-toolbar>
</ion-header>

<ion-content [fullscreen]="true" appScrollbarTheme class="scrollx">
	<div #gantt_here class="gantt-chart"></div>
</ion-content>
